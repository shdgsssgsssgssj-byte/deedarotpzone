name: IVAS SMS Fetcher

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install express
      
      - name: Run IVAS fetcher
        run: node index.js
      
      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: ivas-data
          path: output.json
          retention-days: 7
